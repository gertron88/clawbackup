version: '3.8'

services:
  # PostgreSQL for metadata
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: clawbackup
      POSTGRES_PASSWORD: clawbackup
      POSTGRES_DB: clawbackup
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clawbackup"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MinIO for object storage (S3-compatible)
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Create bucket on startup
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb local/clawbackup || true;
      /usr/bin/mc policy set public local/clawbackup || true;
      exit 0;
      "

  # ClawBackup API server
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      CLAWBACKUP_DATABASE_URL: postgresql://clawbackup:clawbackup@postgres:5432/clawbackup
      CLAWBACKUP_S3_ENDPOINT: http://minio:9000
      CLAWBACKUP_S3_BUCKET: clawbackup
      CLAWBACKUP_S3_ACCESS_KEY: minioadmin
      CLAWBACKUP_S3_SECRET_KEY: minioadmin
      CLAWBACKUP_S3_REGION: us-east-1
      CLAWBACKUP_FREE_TIER_QUOTA_GB: "1.0"
      CLAWBACKUP_BACKUP_RETENTION_DAYS: "30"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    volumes:
      - ./api:/app/api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
  minio_data:
